name: Orhun CI

on:
  push:
    branches: ["master", "main"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Build and run tests
        run: bash tests/run_tests.sh
