name: Bug report
description: Report a reproducible Orhun bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal code or commands that reproduce the issue.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version Or Commit
      placeholder: "orhun doctor --json, git commit, or release version"
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Lexer/parser
        - Compiler/bytecode
        - VM/runtime
        - Standard library
        - CLI/tooling
        - Documentation
        - Other
